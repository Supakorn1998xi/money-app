<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f5f7fb;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.balance{
font-size:36px;
font-weight:bold;
color:#2c7be5;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
width:100%;
}

canvas{
max-width:350px;
}

#history{
display:none;
}

</style>

</head>

<body>

<h1>💰 Money Tracker</h1>

<div class="card">
เงินคงเหลือ
<div class="balance" id="balance">0</div>
</div>

<div class="card">

<h2>เพิ่มรายการ</h2>

<select id="type" onchange="updateCategory()">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="category"></select>

<input id="amount" placeholder="จำนวนเงิน">
<input id="note" placeholder="รายละเอียด">

<button onclick="save()">บันทึก</button>

</div>

<div class="card">
<h2>งบแต่ละหมวด</h2>
<canvas id="budgetChart"></canvas>
</div>

<div class="card">

<button onclick="toggleHistory()">ดูประวัติ</button>
<div id="history"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzbpK_vp-WGzS-huLYhYCP_25mzcTZT5nR8uqzg8wnAzHQYR72H8ofl6BVoL1Om9UiXug/exec"

let chart

// สัดส่วนเงินเดือน
const ratio={
house:0.25,
car:0.15,
child:0.15,
food:0.20,
travel:0.10,
fuel:0.10,
other:0.05
}

function updateCategory(){

const type=document.getElementById("type").value
const category=document.getElementById("category")

if(type==="income"){

category.innerHTML=`
<option value="salary">เงินเดือน</option>
`

}

if(type==="expense"){

category.innerHTML=`

<option value="house">บ้าน</option>
<option value="car">รถ</option>
<option value="child">ลูก</option>
<option value="food">กิน</option>
<option value="travel">เที่ยว</option>
<option value="fuel">น้ำมัน</option>
<option value="other">อื่นๆ</option>

`

}

}

updateCategory()

async function load(){

const res=await fetch(API)
const data=await res.json()

let income=0
let expense=0

let bucket={
house:0,
car:0,
child:0,
food:0,
travel:0,
fuel:0,
other:0
}

let historyHTML=""

data.forEach(t=>{

const amount=Number(t.amount)||0

if(t.type==="income"){

income+=amount

bucket.house+=amount*ratio.house
bucket.car+=amount*ratio.car
bucket.child+=amount*ratio.child
bucket.food+=amount*ratio.food
bucket.travel+=amount*ratio.travel
bucket.fuel+=amount*ratio.fuel
bucket.other+=amount*ratio.other

}

if(t.type==="expense"){

expense+=amount

if(bucket[t.category]!==undefined){
bucket[t.category]-=amount
}

}

historyHTML+=`
<div>
${t.date} | ${t.category} | ${amount} | ${t.note||""}
</div>
`

})

document.getElementById("balance").innerText=income-expense
document.getElementById("history").innerHTML=historyHTML

drawChart(bucket)

}

function drawChart(bucket){

const labels=[
"บ้าน",
"รถ",
"ลูก",
"กิน",
"เที่ยว",
"น้ำมัน",
"อื่นๆ"
]

const values=[
bucket.house,
bucket.car,
bucket.child,
bucket.food,
bucket.travel,
bucket.fuel,
bucket.other
]

if(chart) chart.destroy()

chart=new Chart(
document.getElementById("budgetChart"),
{
type:"pie",
data:{
labels:labels,
datasets:[{
data:values
}]
}
}
)

}

async function save(){

const type=document.getElementById("type").value
const category=document.getElementById("category").value
const amount=document.getElementById("amount").value
const note=document.getElementById("note").value

await fetch(API,{
method:"POST",
body:JSON.stringify({
type:type,
category:category,
amount:amount,
note:note,
date:new Date().toLocaleDateString()
})
})

alert("บันทึกแล้ว")
location.reload()

}

function toggleHistory(){

const el=document.getElementById("history")

if(el.style.display==="none"){
el.style.display="block"
}else{
el.style.display="none"
}

}

load()

</script>

</body>
</html>
