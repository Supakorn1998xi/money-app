<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="header">
💰 Money Tracker
</div>


<!-- total -->

<div class="total-card">

<div>ยอดเงินคงเหลือ</div>

<h2>฿<span id="totalMoney">0</span></h2>

</div>


<!-- chart -->

<div class="chart-box">

<canvas id="pieChart"></canvas>

</div>


<!-- transactions -->

<div class="transaction-list" id="transactionList"></div>


<!-- form -->

<div class="form-box">

<select id="type">
<option value="expense">รายจ่าย</option>
<option value="income">รายรับ</option>
</select>

<input id="category" placeholder="หมวดหมู่">

<input id="amount" type="number" placeholder="จำนวนเงิน">

<button onclick="saveTransaction()">
บันทึกรายการ
</button>

</div>

</div>


<!-- popup -->

<div id="popup" class="popup">

<div class="popup-box">

<h3>บันทึกเรียบร้อย</h3>

<p>รายการถูกบันทึกแล้ว</p>

<button onclick="closePopup()">ปิด</button>

</div>

</div>


<script src="app.js"></script>

</body>
</html>
