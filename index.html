<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>Money Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>💰 Money Tracker</h1>

<div class="balance-card">

<h2>เงินคงเหลือ</h2>

<h1 id="totalMoney">฿0</h1>

</div>

<form id="form">

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="category">
<option value="Food">ค่ากิน</option>
<option value="Gas">ค่าน้ำมัน</option>
<option value="Travel">ค่าเที่ยว</option>
<option value="Future">อนาคต</option>
</select>

<input type="number" id="amount" placeholder="จำนวนเงิน" required>

<button type="submit">บันทึก</button>

</form>

<div class="charts">

<div class="chart-box">
<h3>สัดส่วนรายจ่าย</h3>
<canvas id="expenseChart"></canvas>
</div>

<div class="chart-box">
<h3>Goal</h3>
<canvas id="goalChart"></canvas>
</div>

</div>

<div class="history">

<h3>ประวัติรายการล่าสุด</h3>

<ul id="transactionList"></ul>

<a
class="sheet-btn"
href="https://docs.google.com/spreadsheets/d/1IOMppJFPrQN9XzY8-ZPYVBHlJyNIEayNLoBkjAHZtaE/edit?usp=sharing"
target="_blank"
>
ดูทั้งหมดใน Google Sheet
</a>

</div>

</div>

<div id="popup" class="popup">

<div class="popup-content">

<p>✅ บันทึกข้อมูลเรียบร้อย</p>

<button onclick="closePopup()">ปิด</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
