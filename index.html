```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Money Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:20px;
}

h2{
margin-top:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

canvas{
max-height:350px;
}
</style>
</head>

<body>

<div class="container">

<h1>Money Dashboard</h1>

<div class="card">
<h2>Income vs Expense</h2>
<canvas id="cashChart"></canvas>
</div>

<div class="card">
<h2>Savings Allocation</h2>
<canvas id="savingsChart"></canvas>
</div>

<div class="card">
<h2>Goals Progress</h2>
<canvas id="goalsChart"></canvas>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzkl3ZDKFPqZNCvZHH65AgifHNBXAvgkgIWwQvjM1gcrTqX73aNgc-gdGcfgFj6TfOgSA/execL";

const allocation={
บ้าน:0.25,
รถ:0.15,
ลูก:0.15,
กิน:0.20,
เที่ยว:0.10,
น้ำมัน:0.10,
อื่นๆ:0.05
};

async function loadData(){

const t=await fetch(API+"?sheet=transactions");
const transactions=await t.json();

const g=await fetch(API+"?sheet=goals");
const goals=await g.json();

renderIncomeExpense(transactions);

const savings=calculateSavings(transactions);
renderSavingsChart(savings);

renderGoals(goals);

}

function calculateSavings(transactions){

let income=0;

transactions.forEach(t=>{
if(t.type==="income"){
income+=Number(t.amount);
}
});

let result={};

Object.keys(allocation).forEach(cat=>{
result[cat]=income*allocation[cat];
});

return result;

}

function renderSavingsChart(data){

new Chart(document.getElementById("savingsChart"),{
type:'pie',
data:{
labels:Object.keys(data),
datasets:[{
data:Object.values(data)
}]
}
});

}

function renderGoals(goals){

new Chart(document.getElementById("goalsChart"),{
type:'bar',
data:{
labels:goals.map(g=>g.category),
datasets:[
{
label:'Saved',
data:goals.map(g=>Number(g.saved))
},
{
label:'Target',
data:goals.map(g=>Number(g.target))
}
]
}
});

}

function renderIncomeExpense(transactions){

let income=0;
let expense=0;

transactions.forEach(t=>{
if(t.type==="income") income+=Number(t.amount);
if(t.type==="expense") expense+=Number(t.amount);
});

new Chart(document.getElementById("cashChart"),{
type:'doughnut',
data:{
labels:['Income','Expense'],
datasets:[{
data:[income,expense]
}]
}
});

}

loadData();

</script>

</body>
</html>
```
